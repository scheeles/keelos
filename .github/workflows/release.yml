name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

env:
  CARGO_TERM_COLOR: always
  K8S_DEFAULT_VERSION: v1.31.0

jobs:
  # ============================================================================
  # Determine version (shared by all jobs)
  # ============================================================================
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Build OS Image Variants (cloud, bare-metal, edge, dev)
  # Each variant runs in parallel via matrix strategy.
  # ============================================================================
  build-os:
    needs: [version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: cloud
            description: "Cloud (AWS/GCP/Azure)"
          - name: bare-metal
            description: "Bare Metal (PXE/ISO)"
          - name: edge
            description: "Edge/IoT (Minimal)"
          - name: dev
            description: "Development (Debug)"
        k8s_version:
          - v1.29.0
          - v1.30.0
          - v1.31.0
          - v1.32.0
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-release-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-release-
            ${{ runner.os }}-buildx-

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Cache Kernel
        uses: actions/cache@v5
        with:
          path: |
            .cache/kernel
            build/kernel
          key: ${{ runner.os }}-kernel-${{ matrix.variant.name }}-${{ hashFiles('tools/builder/kernel-build.sh', 'tools/builder/variants/*.conf') }}

      - name: Build Builder Image (K8s ${{ matrix.k8s_version }})
        uses: docker/build-push-action@v6
        with:
          context: ./tools/builder
          push: false
          load: true
          tags: keelos-builder:latest
          build-args: |
            K8S_VERSION=${{ matrix.k8s_version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Build ${{ matrix.variant.description }} Variant (K8s ${{ matrix.k8s_version }})
        run: |
          mkdir -p target .cache/kernel build build/variants
          docker run --rm \
            -v ${{ github.workspace }}:/keelos \
            -v ~/.cargo/registry:/root/.cargo/registry \
            -v ~/.cargo/git:/root/.cargo/git \
            --privileged \
            keelos-builder:latest \
            /keelos/tools/builder/build-variant.sh ${{ matrix.variant.name }} ${{ needs.version.outputs.version }}

      - name: Fix Permissions
        if: always()
        run: |
          sudo chown -R $USER:$USER target ~/.cargo .cache build || true

      - name: Upload Variant Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: keelos-${{ matrix.variant.name }}-k8s-${{ matrix.k8s_version }}
          path: build/variants/${{ matrix.variant.name }}/keelos-*
          retention-days: 7

  # ============================================================================
  # Build base OS images (backwards-compatible, produces generic ISO/RAW/QCOW2)
  # ============================================================================
  build-os-base:
    needs: [version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s_version:
          - v1.29.0
          - v1.30.0
          - v1.31.0
          - v1.32.0
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-release-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-release-
            ${{ runner.os }}-buildx-

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Cache Kernel
        uses: actions/cache@v5
        with:
          path: |
            .cache/kernel
            build/kernel
          key: ${{ runner.os }}-kernel-${{ hashFiles('tools/builder/kernel-build.sh', 'tools/builder/kernel-config') }}

      - name: Build Builder Image (K8s ${{ matrix.k8s_version }})
        uses: docker/build-push-action@v6
        with:
          context: ./tools/builder
          push: false
          load: true
          tags: keelos-builder:latest
          build-args: |
            K8S_VERSION=${{ matrix.k8s_version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Build OS Components
        run: |
          mkdir -p target .cache/kernel build
          docker run --rm \
            -v ${{ github.workspace }}:/keelos \
            -v ~/.cargo/registry:/root/.cargo/registry \
            -v ~/.cargo/git:/root/.cargo/git \
            --privileged \
            keelos-builder:latest \
            /keelos/tools/ci-build-only.sh

      - name: Build Release Images
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/keelos \
            --privileged \
            keelos-builder:latest \
            /keelos/tools/builder/build-images.sh ${{ needs.version.outputs.version }}

      - name: Fix Permissions
        if: always()
        run: |
          sudo chown -R $USER:$USER target ~/.cargo .cache build || true

      - name: Upload ISO
        uses: actions/upload-artifact@v6
        with:
          name: keelos-iso-k8s-${{ matrix.k8s_version }}
          path: build/keelos-*.iso
          retention-days: 7

      - name: Upload RAW
        uses: actions/upload-artifact@v6
        with:
          name: keelos-raw-k8s-${{ matrix.k8s_version }}
          path: build/keelos-*.raw.gz
          retention-days: 7

      - name: Upload QCOW2
        uses: actions/upload-artifact@v6
        with:
          name: keelos-qcow2-k8s-${{ matrix.k8s_version }}
          path: build/keelos-*.qcow2
          retention-days: 7

      - name: Upload PXE Bundle
        uses: actions/upload-artifact@v6
        with:
          name: keelos-pxe-k8s-${{ matrix.k8s_version }}
          path: build/keelos-*-pxe.tar.gz
          retention-days: 7

  # ============================================================================
  # Build osctl CLI (Linux, Windows)
  # ============================================================================
  build-osctl-linux-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            name: Linux_arm64
          - target: arm-unknown-linux-musleabihf
            name: Linux_armv6
          - target: armv7-unknown-linux-musleabihf
            name: Linux_armv7
          - target: x86_64-unknown-linux-musl
            name: Linux_x86
          - target: x86_64-pc-windows-gnu
            name: Windows_x86
            ext: .exe
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Build
        run: cross build --release --package osctl --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist/${{ matrix.name }}
          cp target/${{ matrix.target }}/release/osctl${{ matrix.ext }} dist/${{ matrix.name }}/osctl${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: osctl-${{ matrix.name }}
          path: dist/${{ matrix.name }}

  # ============================================================================
  # Build osctl CLI (macOS)
  # ============================================================================
  build-osctl-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: Darwin_arm64
          - target: x86_64-apple-darwin
            name: Darwin_x86
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        run: brew install protobuf

      - name: Build
        run: cargo build --release --package osctl --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist/${{ matrix.name }}
          cp target/${{ matrix.target }}/release/osctl dist/${{ matrix.name }}/osctl

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: osctl-${{ matrix.name }}
          path: dist/${{ matrix.name }}

  # ============================================================================
  # Create Release & Upload All Artifacts
  # ============================================================================
  release:
    needs: [build-os, build-os-base, build-osctl-linux-windows, build-osctl-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release

          # Base OS Images (per K8s version)
          for base_dir in artifacts/keelos-iso-k8s-* artifacts/keelos-raw-k8s-* artifacts/keelos-qcow2-k8s-* artifacts/keelos-pxe-k8s-*; do
            if [ -d "$base_dir" ]; then
              # Extract K8s version from directory name (e.g., keelos-iso-k8s-v1.31.0 -> v1.31.0)
              k8s_ver=$(echo "$base_dir" | grep -oP 'k8s-v[\d.]+')
              find "$base_dir" -type f \( -name "*.iso" -o -name "*.raw.gz" -o -name "*.qcow2" -o -name "*.tar.gz" -o -name "*.vhd" \) | while read -r f; do
                base=$(basename "$f")
                name="${base%%.*}"
                ext="${base#*.}"
                cp "$f" "release/${name}-${k8s_ver}.${ext}"
              done
            fi
          done

          # Variant OS Images (per K8s version)
          for variant_dir in artifacts/keelos-*-k8s-v*; do
            if [ -d "$variant_dir" ] && [[ "$variant_dir" != *iso* ]] && [[ "$variant_dir" != *raw* ]] && [[ "$variant_dir" != *qcow2* ]] && [[ "$variant_dir" != *pxe* ]]; then
              k8s_ver=$(echo "$variant_dir" | grep -oP 'k8s-v[\d.]+')
              find "$variant_dir" -type f \( -name "*.iso" -o -name "*.raw.gz" -o -name "*.qcow2" -o -name "*.tar.gz" -o -name "*.vhd" \) | while read -r f; do
                base=$(basename "$f")
                name="${base%%.*}"
                ext="${base#*.}"
                cp "$f" "release/${name}-${k8s_ver}.${ext}"
              done
            fi
          done

          # osctl Binaries (not K8s version-specific)
          cd artifacts
          for dir in osctl-*/; do
            name="${dir%/}"
            platform="${name#osctl-}"
            cd "$name"
            if [[ "$platform" == Windows* ]]; then
              zip -r "../../release/osctl-${platform}.zip" .
            else
              chmod +x osctl
              tar -czvf "../../release/osctl-${platform}.tar.gz" .
            fi
            cd ..
          done
          cd ..

          echo "Release contents:"
          ls -la release/

      - name: Generate Checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          generate_release_notes: true
