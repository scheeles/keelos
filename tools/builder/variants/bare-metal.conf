#!/bin/bash
# Bare metal variant - optimized for physical hardware with PXE boot
# Includes hardware drivers and IPMI support

VARIANT_NAME="bare-metal"
VARIANT_DESCRIPTION="Bare metal image with PXE boot and hardware driver support"

# Hardware-specific kernel modules
KERNEL_EXTRA_ENABLE="
  CONFIG_ACPI
  CONFIG_EFI
  CONFIG_EFI_STUB
  CONFIG_SATA_AHCI
  CONFIG_ATA_PIIX
  CONFIG_BLK_DEV_SD
  CONFIG_BLK_DEV_NVME
  CONFIG_SCSI
  CONFIG_SCSI_SAS_ATTRS
  CONFIG_MEGARAID_SAS
  CONFIG_FUSION
  CONFIG_FUSION_SAS
  CONFIG_IPMI_HANDLER
  CONFIG_IPMI_SI
  CONFIG_IPMI_SSIF
  CONFIG_IPMI_DEVICE_INTERFACE
  CONFIG_SENSORS_CORETEMP
  CONFIG_SENSORS_NCT6775
  CONFIG_HWMON
  CONFIG_EDAC
  CONFIG_E1000
  CONFIG_E1000E
  CONFIG_IGB
  CONFIG_IXGBE
  CONFIG_I40E
  CONFIG_MLX4_EN
  CONFIG_MLX5_CORE
  CONFIG_BNX2X
  CONFIG_NET_VENDOR_BROADCOM
  CONFIG_NET_VENDOR_INTEL
  CONFIG_NET_VENDOR_MELLANOX
  CONFIG_PXE
  CONFIG_IP_PNP
  CONFIG_IP_PNP_DHCP
  CONFIG_NFS_FS
  CONFIG_ROOT_NFS
"
KERNEL_EXTRA_DISABLE=""
KERNEL_DEBUG_INFO=false

INITRAMFS_DEBUG_TOOLS=false
INITRAMFS_CLOUD_INIT=false
INITRAMFS_MINIMAL=false

CARGO_PROFILE="release"
STRIP_BINARIES=true

# Bare metal: ISO for install, PXE for network boot
OUTPUT_FORMATS="iso pxe raw"

KERNEL_CMDLINE_EXTRA=""
GRUB_TIMEOUT=5
