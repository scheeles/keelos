#!/bin/bash
# Development variant - includes debug tools and symbols
# NOT for production use

VARIANT_NAME="dev"
VARIANT_DESCRIPTION="Development image with debug tools and symbols (not for production)"

# Debug-friendly kernel
KERNEL_EXTRA_ENABLE="
  CONFIG_DEBUG_INFO
  CONFIG_DEBUG_INFO_DWARF5
  CONFIG_DEBUG_KERNEL
  CONFIG_DETECT_HUNG_TASK
  CONFIG_SOFTLOCKUP_DETECTOR
  CONFIG_HARDLOCKUP_DETECTOR
  CONFIG_LOCK_STAT
  CONFIG_PROVE_LOCKING
  CONFIG_DEBUG_ATOMIC_SLEEP
  CONFIG_STACKTRACE
  CONFIG_FTRACE
  CONFIG_FUNCTION_TRACER
  CONFIG_KPROBES
  CONFIG_BPF_JIT
  CONFIG_MAGIC_SYSRQ
  CONFIG_PRINTK_TIME
"
KERNEL_EXTRA_DISABLE=""
KERNEL_DEBUG_INFO=true

INITRAMFS_DEBUG_TOOLS=true
INITRAMFS_CLOUD_INIT=false
INITRAMFS_MINIMAL=false

# Build with debug profile for symbols
CARGO_PROFILE="dev"
STRIP_BINARIES=false

# Dev: ISO for easy QEMU testing, QCOW2 for libvirt
OUTPUT_FORMATS="iso qcow2"

KERNEL_CMDLINE_EXTRA="debug loglevel=7 earlyprintk=serial"
GRUB_TIMEOUT=10
