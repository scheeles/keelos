#!/bin/bash
# Cloud variant - optimized for cloud deployment (AWS, GCP, Azure)
# Includes cloud metadata integration and virtio drivers

VARIANT_NAME="cloud"
VARIANT_DESCRIPTION="Cloud-optimized image with metadata integration (AWS, GCP, Azure)"

# Cloud-specific kernel modules
KERNEL_EXTRA_ENABLE="
  CONFIG_VIRTIO
  CONFIG_VIRTIO_PCI
  CONFIG_VIRTIO_BLK
  CONFIG_VIRTIO_NET
  CONFIG_VIRTIO_CONSOLE
  CONFIG_VIRTIO_BALLOON
  CONFIG_SCSI_VIRTIO
  CONFIG_HW_RANDOM_VIRTIO
  CONFIG_VIRTIO_MMIO
  CONFIG_XEN_BLKDEV_FRONTEND
  CONFIG_XEN_NETDEV_FRONTEND
  CONFIG_XEN_BALLOON
  CONFIG_HYPERV
  CONFIG_HYPERV_UTILS
  CONFIG_HYPERV_BALLOON
  CONFIG_HYPERV_STORAGE
  CONFIG_HYPERV_NET
  CONFIG_ACPI
  CONFIG_EFI
  CONFIG_EFI_STUB
"
KERNEL_EXTRA_DISABLE=""
KERNEL_DEBUG_INFO=false

INITRAMFS_DEBUG_TOOLS=false
INITRAMFS_CLOUD_INIT=true
INITRAMFS_MINIMAL=false

CARGO_PROFILE="release"
STRIP_BINARIES=true

# Cloud images: raw for AWS AMI, qcow2 for OpenStack/GCP, VHD for Azure
OUTPUT_FORMATS="raw qcow2 vhd gcp"

KERNEL_CMDLINE_EXTRA="net.ifnames=0 biosdevname=0"
GRUB_TIMEOUT=0
