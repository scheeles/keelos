#!/bin/bash
# Edge/IoT variant - minimal footprint for resource-constrained environments
# Stripped kernel, compressed aggressively, minimal initramfs

VARIANT_NAME="edge"
VARIANT_DESCRIPTION="Minimal edge/IoT image for resource-constrained environments"

# Minimal kernel - disable unnecessary subsystems
KERNEL_EXTRA_ENABLE="
  CONFIG_EMBEDDED
  CONFIG_CC_OPTIMIZE_FOR_SIZE
  CONFIG_KERNEL_XZ
"
KERNEL_EXTRA_DISABLE="
  CONFIG_SOUND
  CONFIG_DRM
  CONFIG_USB_SUPPORT
  CONFIG_WIRELESS
  CONFIG_WLAN
  CONFIG_MEDIA_SUPPORT
  CONFIG_INPUT_JOYSTICK
  CONFIG_INPUT_TABLET
  CONFIG_INPUT_TOUCHSCREEN
  CONFIG_NFS_FS
  CONFIG_CIFS
  CONFIG_DEBUG_KERNEL
  CONFIG_FTRACE
  CONFIG_KPROBES
  CONFIG_PROFILING
"
KERNEL_DEBUG_INFO=false

INITRAMFS_DEBUG_TOOLS=false
INITRAMFS_CLOUD_INIT=false
INITRAMFS_MINIMAL=true

CARGO_PROFILE="release"
STRIP_BINARIES=true

# Edge: compressed raw image only (smallest output)
OUTPUT_FORMATS="raw pxe"

KERNEL_CMDLINE_EXTRA="quiet loglevel=3"
GRUB_TIMEOUT=0
