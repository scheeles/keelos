#!/bin/bash
# Base variant configuration - shared defaults for all variants
# Source this before sourcing a specific variant config

# Variant metadata
VARIANT_NAME="base"
VARIANT_DESCRIPTION="Base KeelOS image (generic)"

# Kernel configuration
# Additional kernel configs to enable (space-separated)
KERNEL_EXTRA_ENABLE=""
# Additional kernel configs to disable (space-separated)
KERNEL_EXTRA_DISABLE=""
# Whether to enable kernel debug info
KERNEL_DEBUG_INFO=false

# Initramfs configuration
# Include debug tools (busybox applets: strace, lsof, etc.)
INITRAMFS_DEBUG_TOOLS=false
# Include cloud-init metadata agent
INITRAMFS_CLOUD_INIT=false
# Strip non-essential binaries to minimize size
INITRAMFS_MINIMAL=false

# Cargo build profile
CARGO_PROFILE="release"
# Whether to strip binaries
STRIP_BINARIES=true

# Output image formats (space-separated: iso raw qcow2 pxe vhd ami gcp)
OUTPUT_FORMATS="iso raw qcow2 pxe"

# Extra kernel command line parameters
KERNEL_CMDLINE_EXTRA=""

# GRUB timeout (seconds)
GRUB_TIMEOUT=5
